{% extends 'base.html' %}
{% block title %}No Event Found{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="card p-5 mx-auto" style="max-width:480px;">
    <div style="font-size:3.5rem;">🗓️</div>
    <h3 class="fw-700 mt-3 mb-2">No Active Event</h3>
    <p class="text-muted">There's no active party event right now. Check back later or contact the class rep.</p>
    {% if user.is_authenticated %}
    <a href="{% url 'events:create' %}" class="btn btn-primary-custom mt-3">
      <i class="bi bi-plus-circle me-1"></i>Create Event
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
